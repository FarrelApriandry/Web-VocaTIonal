version: '3.8'

services:
  web:
    build: .
    container_name: vocational-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/apache/vhost.conf:/etc/apache2/sites-available/000-default.conf
      - ./vocational.pem:/etc/apache2/ssl/vocational.pem
      - ./vocational.key:/etc/apache2/ssl/vocational.key
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - vocational-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: vocational-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      TZ: Asia/Jakarta
    volumes:
      - db_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - vocational-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: vocational-pma
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      TZ: Asia/Jakarta
    ports:
      - "127.0.0.1:8081:80"
    networks:
      - vocational-network
    depends_on:
      - db

networks:
  vocational-network:
    driver: bridge

volumes:
  db_data: