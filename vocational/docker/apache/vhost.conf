# ========================================================================
# 1. DEVELOPMENT - LOCAL (HTTP)
# ========================================================================

# Public App (vocational.prod)
<VirtualHost *:80>
    ServerName vocational.prod
    DocumentRoot /var/www/html/public
    
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php [QSA,L]
        </IfModule>
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/vocational_dev_error.log
    CustomLog ${APACHE_LOG_DIR}/vocational_dev_access.log combined
</VirtualHost>

# Admin App (admin.vocational.prod)
<VirtualHost *:80>
    ServerName admin.vocational.prod
    DocumentRoot /var/www/html/admin/public
    
    <Directory /var/www/html/admin/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php?action=$1 [QSA,L]
        </IfModule>
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/admin_dev_error.log
    CustomLog ${APACHE_LOG_DIR}/admin_dev_access.log combined
</VirtualHost>

# ========================================================================
# 2. PRODUCTION - HTTP to HTTPS Redirect
# ========================================================================

<VirtualHost *:80>
    ServerName vocational.info
    ServerAlias www.vocational.info
    ServerAlias admin.vocational.info
    
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteCond %{HTTPS} off
        RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
    </IfModule>
    
    ErrorLog ${APACHE_LOG_DIR}/vocational_prod_redirect_error.log
    CustomLog ${APACHE_LOG_DIR}/vocational_prod_redirect_access.log combined
</VirtualHost>

# ========================================================================
# 3. PRODUCTION - HTTPS SSL (Public App)
# ========================================================================

<VirtualHost *:443>
    ServerName vocational.info
    ServerAlias www.vocational.info
    DocumentRoot /var/www/html/public
    
    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/vocational.pem
    SSLCertificateKeyFile /etc/apache2/ssl/vocational.key
    
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php [QSA,L]
        </IfModule>
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/vocational_prod_error.log
    CustomLog ${APACHE_LOG_DIR}/vocational_prod_access.log combined
</VirtualHost>

# ========================================================================
# 4. PRODUCTION - HTTPS SSL (Admin App)
# ========================================================================

<VirtualHost *:443>
    ServerName admin.vocational.info
    DocumentRoot /var/www/html/admin/public
    
    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/vocational.pem
    SSLCertificateKeyFile /etc/apache2/ssl/vocational.key
    
    <Directory /var/www/html/admin/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php?action=$1 [QSA,L]
        </IfModule>
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/admin_prod_error.log
    CustomLog ${APACHE_LOG_DIR}/admin_prod_access.log combined
</VirtualHost>